mga2p2_form.api.session:
  path: '/mga2p2-form/api/session'
  defaults:
    _controller: '\Drupal\mga2p2_form\Controller\FormSessionApiController::session'
  methods: [GET]
  requirements:
    _access: 'TRUE'

