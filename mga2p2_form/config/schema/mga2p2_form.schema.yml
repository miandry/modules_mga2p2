mga2p2_form.mobile_ussd:
  type: config_object
  label: 'Mobile USSD code patterns (form / orders)'
  mapping:
    mvola_pattern:
      type: string
      label: 'MVola USSD pattern (placeholders NUM, MONTANT = digits only)'
    orange_pattern:
      type: string
      label: 'Orange Money USSD pattern (placeholders NUMÉRO or NUMERO or NUM, MONTANT)'

mga2p2_form.webpush:
  type: config_object
  label: 'Web push (order status)'
  mapping:
    enabled:
      type: boolean
      label: 'Send push when order status changes'
    vapid_subject:
      type: string
      label: 'VAPID subject (mailto: or https URL)'
    vapid_public:
      type: string
      label: 'VAPID public key'
    vapid_private:
      type: string
      label: 'VAPID private key'
