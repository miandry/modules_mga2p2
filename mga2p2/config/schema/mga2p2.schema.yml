mga2p2.settings:
  type: config_object
  label: 'MGA P2P settings'
  mapping:
    api_key:
      type: string
      label: 'Binance API key'
    secret_key:
      type: string
      label: 'Binance secret key'
    allow_anonymous_proxy:
      type: boolean
      label: 'Allow anonymous access to the proxy'
    recv_window:
      type: integer
      label: 'recvWindow (ms)'
    allowed_path_prefixes:
      type: sequence
      label: 'Allowed Binance API path prefixes'
      sequence:
        type: string
    openai_api_key:
      type: string
      label: 'OpenAI API key (receipt vision)'
    openai_base_url:
      type: string
      label: 'OpenAI-compatible API base URL'
    openai_model:
      type: string
      label: 'Vision model name'
